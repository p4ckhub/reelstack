# ============================================================
# Docker Compose — Mikrus (VPS + Lambda render)
# ============================================================
# Kontenery: nginx + web + worker + redis
# Storage:   Cloudflare R2 (zewnętrzny S3-compatible)
# Database:  Neon (zewnętrzny PostgreSQL — brak kontenera postgres)
# Render:    AWS Lambda — brak kontenera reel-worker
#
# Deploy:
#   docker compose -f docker-compose.mikrus.yml pull
#   docker compose -f docker-compose.mikrus.yml up -d
#
# Logi:
#   docker compose -f docker-compose.mikrus.yml logs -f worker
# ============================================================

services:
  nginx:
    image: nginx:alpine
    ports:
      - "3080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  web:
    image: ghcr.io/jurczykpawel/reelstack:latest
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ghcr.io/jurczykpawel/reelstack-worker:latest
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'bun' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Uncomment if using local PostgreSQL instead of external (Neon/Supabase)
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-reelstack}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  # postgres_data:
  redis_data:
