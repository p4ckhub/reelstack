repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.93.7
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog git file://. --since-commit HEAD --no-verification --fail
        language: golang
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: lint-staged
        name: lint-staged (ESLint + Prettier on changed files)
        entry: bunx lint-staged
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: typecheck
        name: TypeScript type check
        entry: bash -c 'bun run lint'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: tests
        name: Run tests
        entry: bash -c 'bun run test'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: typecheck-web
        name: TypeScript strict check on apps/web
        # Catches build-time TS errors (like missing custom element attributes)
        # that ESLint misses. Skip with: SKIP=typecheck-web git push
        entry: bash -c 'cd apps/web && bunx tsc --noEmit 2>&1 | grep -v "^remotion-entry.local.ts" | { grep "error TS" && exit 1 || true; }'
        language: system
        pass_filenames: false
        stages: [pre-push]
