<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Webinar Cover</title>
<!--
  Cover slide for carousels / stories.
  Params: ?brand=BRAND&title=TITLE&subtitle=SUB&number=N&logo=/path/to/logo.png
-->
<link rel="stylesheet" href="_base.css">
<link id="brand-css" rel="stylesheet" href="">
<style>
  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--brand-accent), var(--brand-cta));
    z-index: 3;
  }

  .deco-num {
    position: absolute;
    top: 8vh;
    right: 8vw;
    font-family: var(--brand-font-heading);
    font-size: 18vw;
    font-weight: var(--brand-heading-weight-heavy);
    color: var(--brand-accent-dim);
    line-height: 1;
    z-index: 0;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: var(--safe-top) var(--safe-right) calc(var(--safe-bottom) + var(--footer-height)) var(--safe-left);
    text-align: center;
  }

  .title {
    font-family: var(--brand-font-heading);
    font-weight: var(--brand-heading-weight-heavy);
    color: var(--brand-text-primary);
    line-height: 1.12;
    letter-spacing: -0.02em;
    max-width: 85vw;
    text-transform: uppercase;
  }

  .accent-line {
    width: 12vw;
    height: 4px;
    background: var(--brand-cta);
    margin-top: 4vh;
    border-radius: 2px;
  }

  .subtitle {
    font-family: var(--brand-font-body);
    font-size: 2.2vw;
    color: var(--brand-text-secondary);
    margin-top: 3vh;
    max-width: 75vw;
  }

  .logo {
    position: absolute;
    bottom: calc(var(--footer-bottom) + var(--footer-height) + 2vh);
    left: 50%;
    transform: translateX(-50%);
    height: 6vh;
    object-fit: contain;
    z-index: 2;
  }

  .footer {
    position: absolute;
    bottom: var(--footer-bottom);
    left: 0; right: 0;
    height: var(--footer-height);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--brand-accent);
    z-index: 2;
  }

  .footer-name {
    font-family: var(--brand-font-heading);
    font-size: 2vw;
    font-weight: var(--brand-heading-weight);
    color: var(--brand-bg-primary);
    letter-spacing: 0.03em;
  }

  @media (max-aspect-ratio: 3/4) {
    .deco-num { font-size: 22vw; }
    .subtitle { font-size: 3vw; }
    .footer-name { font-size: 2.6vw; }
  }
  @media (min-aspect-ratio: 4/3) {
    .deco-num { font-size: 14vw; }
    .subtitle { font-size: 1.8vw; }
    .footer-name { font-size: 1.8vw; }
  }
</style>
</head>
<body>
<div class="accent-top"></div>
<div class="deco-num" id="decoNum"></div>
<div class="card">
  <div class="title" id="title">Cover Title</div>
  <div class="accent-line"></div>
  <div class="subtitle" id="subtitle"></div>
</div>
<img id="logo" class="logo" style="display:none">
<div class="footer">
  <span class="footer-name" id="footerName"></span>
</div>
<script src="_base.js"></script>
<script src="webinar-cover.js"></script>
</body>
</html>
