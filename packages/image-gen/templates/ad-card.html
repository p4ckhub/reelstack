<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Ad Card</title>
<!--
  Ad Card Template — for YouTube / Instagram / Facebook ads
  Params: ?brand=BRAND&badge=TAG&title=HEADLINE&text=VALUE_PROP&cta=CTA&attr=SUBTEXT&num=001
  Optional: &urgency=LIMITED_TEXT &bg=/path/to/image.jpg &bg_opacity=0.65
-->
<link rel="stylesheet" href="_base.css">
<link id="brand-css" rel="stylesheet" href="">
<style>
  /* Background accent glow */
  .glow-top {
    position: absolute;
    width: 80vw;
    height: 50vh;
    top: -10vh;
    left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(ellipse, var(--brand-accent-dim) 0%, transparent 70%);
    pointer-events: none;
  }

  .glow-bottom {
    position: absolute;
    width: 60vw;
    height: 40vh;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(ellipse, rgba(from var(--brand-cta) r g b / 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Accent line top */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--brand-cta), var(--brand-accent));
    z-index: 3;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: var(--safe-top) var(--safe-right) calc(var(--safe-bottom) + var(--footer-height)) var(--safe-left);
    text-align: center;
  }

  /* Badge */
  .badge {
    display: inline-block;
    font-family: var(--brand-font-mono);
    font-size: 1.4vw;
    font-weight: 700;
    color: var(--brand-cta-text);
    background: var(--brand-cta);
    padding: 0.7vh 2.5vw;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 3.5vh;
  }

  /* Headline */
  .headline {
    font-family: var(--brand-font-heading);
    font-weight: var(--brand-heading-weight-heavy);
    color: var(--brand-text-primary);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 3vh;
    max-width: 88vw;
  }

  /* Accent word highlight */
  .headline em {
    font-style: normal;
    color: var(--brand-accent);
  }

  /* Value proposition */
  .value-prop {
    font-family: var(--brand-font-body);
    font-size: 2.2vw;
    font-weight: 500;
    color: var(--brand-text-secondary);
    line-height: 1.5;
    margin-bottom: 4vh;
    max-width: 78vw;
  }

  /* CTA button */
  .cta {
    display: inline-block;
    font-family: var(--brand-font-body);
    font-size: 2.2vw;
    font-weight: 700;
    color: var(--brand-cta-text);
    background: var(--brand-cta);
    padding: 2vh 6vw;
    border-radius: var(--brand-radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    box-shadow: var(--brand-shadow-md);
    margin-bottom: 2vh;
  }

  /* Urgency line */
  .urgency {
    font-family: var(--brand-font-mono);
    font-size: 1.5vw;
    color: var(--brand-cta);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 1.5vh;
  }

  /* Subtext / attr */
  .subtext {
    font-family: var(--brand-font-body);
    font-size: 1.6vw;
    color: var(--brand-text-muted);
    margin-top: 2vh;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: var(--footer-bottom);
    left: 0;
    right: 0;
    height: var(--footer-height);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--brand-bg-secondary);
    border-top: 1px solid var(--brand-border);
    z-index: 2;
  }

  .footer-name {
    font-family: var(--brand-font-mono);
    font-size: 1.6vw;
    font-weight: 500;
    color: var(--brand-text-muted);
    letter-spacing: 0.06em;
  }

  /* Vertical adjustments */
  @media (max-aspect-ratio: 3/4) {
    .badge { font-size: 2vw; padding: 0.9vh 3.5vw; margin-bottom: 5vh; }
    .value-prop { font-size: 3vw; margin-bottom: 6vh; }
    .cta { font-size: 3vw; padding: 2.5vh 8vw; }
    .urgency { font-size: 2.2vw; }
    .subtext { font-size: 2.2vw; }
    .footer-name { font-size: 2vw; }
  }

  /* Horizontal adjustments */
  @media (min-aspect-ratio: 4/3) {
    .badge { font-size: 1.1vw; padding: 0.8vh 2vw; margin-bottom: 2.5vh; }
    .value-prop { font-size: 1.7vw; margin-bottom: 3vh; max-width: 70vw; }
    .cta { font-size: 1.6vw; padding: 1.8vh 4.5vw; }
    .urgency { font-size: 1.2vw; }
    .subtext { font-size: 1.3vw; }
    .footer-name { font-size: 1.3vw; }
  }
</style>
</head>
<body>

<div class="accent-line"></div>
<div class="glow-top"></div>

<div class="card">
  <div class="badge" id="badge"></div>
  <div class="headline" id="headline">Headline Here</div>
  <div class="value-prop" id="valueProp"></div>
  <div class="cta" id="cta"></div>
  <div class="urgency" id="urgency"></div>
  <div class="subtext" id="subtext"></div>
</div>

<div class="footer">
  <span class="footer-name" id="footerName"></span>
</div>

<script src="_base.js"></script>
<script src="ad-card.js"></script>
</body>
</html>
