<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Announcement</title>
<!--
  Announcement Template
  Params: ?brand=BRAND&badge=TAG&title=EVENT&date=DATE&attr=SPEAKER&cta=CTA_TEXT&num=001
  Optional: &bg=/path/to/image.jpg &bg_opacity=0.65
-->
<link rel="stylesheet" href="_base.css">
<link id="brand-css" rel="stylesheet" href="">
<style>
  /* Decorative glow */
  .glow {
    position: absolute;
    width: 70vw;
    height: 70vw;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--brand-accent-dim) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: var(--safe-top) var(--safe-right) calc(var(--safe-bottom) + var(--footer-height)) var(--safe-left);
    text-align: center;
  }

  /* Badge */
  .badge {
    display: inline-block;
    font-family: var(--brand-font-mono);
    font-size: 1.5vw;
    font-weight: 700;
    color: var(--brand-cta-text);
    background: var(--brand-cta);
    padding: 0.8vh 3vw;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4vh;
  }

  /* Title */
  .title {
    font-family: var(--brand-font-heading);
    font-weight: var(--brand-heading-weight-heavy);
    color: var(--brand-text-primary);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 3vh;
    max-width: 85vw;
  }

  /* Speaker */
  .speaker {
    font-family: var(--brand-font-body);
    font-size: 2.2vw;
    color: var(--brand-text-secondary);
    margin-bottom: 1.5vh;
  }

  /* Date */
  .date {
    font-family: var(--brand-font-mono);
    font-size: 2vw;
    color: var(--brand-accent);
    letter-spacing: 0.05em;
    margin-bottom: 4vh;
  }

  /* CTA Button */
  .cta {
    display: inline-block;
    font-family: var(--brand-font-body);
    font-size: 2vw;
    font-weight: 700;
    color: var(--brand-cta-text);
    background: var(--brand-cta);
    padding: 1.8vh 5vw;
    border-radius: var(--brand-radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    box-shadow: var(--brand-shadow-md);
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: var(--footer-bottom);
    left: 0;
    right: 0;
    height: var(--footer-height);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--brand-accent);
    z-index: 2;
  }

  .footer-name {
    font-family: var(--brand-font-heading);
    font-size: 2vw;
    font-weight: var(--brand-heading-weight);
    color: var(--brand-bg-primary);
    letter-spacing: 0.03em;
  }

  /* Vertical adjustments */
  @media (max-aspect-ratio: 3/4) {
    .badge { font-size: 2.2vw; padding: 1vh 4vw; margin-bottom: 5vh; }
    .speaker { font-size: 3vw; }
    .date { font-size: 2.8vw; margin-bottom: 6vh; }
    .cta { font-size: 2.8vw; padding: 2vh 7vw; }
    .footer-name { font-size: 2.6vw; }
  }

  /* Horizontal adjustments */
  @media (min-aspect-ratio: 4/3) {
    .badge { font-size: 1.2vw; }
    .speaker { font-size: 1.8vw; }
    .date { font-size: 1.6vw; }
    .cta { font-size: 1.6vw; padding: 1.5vh 4vw; }
    .footer-name { font-size: 1.8vw; }
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <div class="badge" id="badge">EVENT</div>
  <div class="title" id="title">Event Title Here</div>
  <div class="speaker" id="speaker"></div>
  <div class="date" id="date"></div>
  <div class="cta" id="cta">ZAPISZ SIE</div>
</div>

<div class="footer">
  <span class="footer-name" id="footerName"></span>
</div>

<script src="_base.js"></script>
<script src="announcement.js"></script>
</body>
</html>
