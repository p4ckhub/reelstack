<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1080" />
    <title>Webinar Point</title>
    <!--
  Numbered point slide for carousels.
  Params: ?brand=BRAND&number=1&title=TITLE&text=DESC
  Optional: &color=#hex (overrides accent circle + footer)
-->
    <link rel="stylesheet" href="_base.css" />
    <link id="brand-css" rel="stylesheet" href="" />
    <style>
      .accent-line {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--brand-accent), var(--brand-cta));
      }

      .series-num {
        position: absolute;
        top: var(--safe-top);
        right: var(--safe-right);
        font-family: var(--brand-font-mono);
        font-size: 1.8vw;
        color: var(--brand-accent);
        opacity: 0.7;
        letter-spacing: 0.05em;
        z-index: 2;
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: var(--safe-top) var(--safe-right) calc(var(--safe-bottom) + var(--footer-height))
          var(--safe-left);
        text-align: left;
      }

      .badge {
        align-self: flex-start;
        font-family: var(--brand-font-mono);
        font-size: 1.4vw;
        font-weight: 600;
        color: var(--brand-accent);
        background: var(--brand-badge-accent-bg);
        padding: 0.6vh 2vw;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 4vh;
      }

      .num-circle {
        width: 12vw;
        height: 12vw;
        border-radius: 50%;
        background: var(--brand-accent);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 5vh;
        align-self: flex-start;
      }

      .num-text {
        font-family: var(--brand-font-heading);
        font-size: 5vw;
        font-weight: var(--brand-heading-weight-heavy);
        color: var(--brand-bg-primary);
        line-height: 1;
      }

      .title {
        font-family: var(--brand-font-heading);
        font-weight: var(--brand-heading-weight);
        color: var(--brand-text-primary);
        line-height: 1.2;
        letter-spacing: -0.015em;
        max-width: 100%;
        margin-bottom: 4vh;
        text-wrap: balance;
      }

      /* Amber underline accent for a highlighted fragment of the title. */
      .title-highlight {
        position: relative;
        display: inline;
        z-index: 1;
        padding: 0 0.2vw;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
        background-image: linear-gradient(
          transparent 72%,
          var(--brand-cta) 72%,
          var(--brand-cta) 94%,
          transparent 94%
        );
      }

      .description {
        font-family: var(--brand-font-body);
        font-size: 2vw;
        color: var(--brand-text-secondary);
        line-height: 1.6;
        max-width: 90%;
      }

      .accent-bar {
        position: absolute;
        bottom: calc(var(--footer-bottom) + var(--footer-height));
        left: 0;
        right: 0;
        height: 3px;
        background: var(--brand-cta);
      }

      .footer {
        position: absolute;
        bottom: var(--footer-bottom);
        left: 0;
        right: 0;
        height: var(--footer-height);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--brand-accent);
        z-index: 2;
      }

      .footer-name {
        font-family: var(--brand-font-heading);
        font-size: 2vw;
        font-weight: var(--brand-heading-weight);
        color: var(--brand-bg-primary);
        letter-spacing: 0.03em;
      }

      @media (max-aspect-ratio: 3/4) {
        .num-circle {
          width: 16vw;
          height: 16vw;
        }
        .num-text {
          font-size: 7vw;
        }
        .description {
          font-size: 2.8vw;
        }
        .footer-name {
          font-size: 2.6vw;
        }
        .series-num {
          font-size: 2.4vw;
        }
        .badge {
          font-size: 2vw;
          padding: 1vh 2.6vw;
        }
      }
      @media (min-aspect-ratio: 3/4) and (max-aspect-ratio: 1/1) {
        .series-num {
          font-size: 2vw;
        }
        .badge {
          font-size: 1.7vw;
        }
      }
      @media (min-aspect-ratio: 4/3) {
        .num-circle {
          width: 10vw;
          height: 10vw;
        }
        .num-text {
          font-size: 4vw;
        }
        .description {
          font-size: 1.6vw;
        }
        .footer-name {
          font-size: 1.8vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="accent-line"></div>
    <div class="series-num" id="seriesNum"></div>
    <div class="card">
      <div class="badge" id="badge"></div>
      <div class="num-circle">
        <span class="num-text" id="numText">#1</span>
      </div>
      <div class="title" id="title">Point title</div>
      <div class="description" id="description"></div>
    </div>
    <div class="accent-bar"></div>
    <div class="footer">
      <span class="footer-name" id="footerName"></span>
    </div>
    <script src="_base.js"></script>
    <script src="point.js"></script>
  </body>
</html>
