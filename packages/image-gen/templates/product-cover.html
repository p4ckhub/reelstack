<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<title>Product Cover</title>
<link rel="stylesheet" href="_base.css">
<link id="brand-css" rel="stylesheet" href="">
<style>
  body { overflow: hidden; }
  .deco-circle-1 {
    position: absolute; top: -15%; right: -10%;
    width: 55%; height: 80%; border-radius: 50%;
    background: var(--brand-accent); opacity: 0.06; z-index: 0;
  }
  .deco-circle-2 {
    position: absolute; bottom: -20%; left: -8%;
    width: 45%; height: 70%; border-radius: 50%;
    background: var(--brand-cta); opacity: 0.05; z-index: 0;
  }
  .deco-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, var(--brand-accent) 0.8px, transparent 0.8px);
    background-size: 40px 40px; opacity: 0.04; z-index: 0;
  }
  .accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--brand-accent), var(--brand-cta)); z-index: 3;
  }
  .card {
    position: relative; z-index: 1; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8% 12%; gap: 3vh;
  }
  .hero-visual { width: 22vw; height: 10vw; }
  .hero-visual svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 2px 12px rgba(91, 141, 239, 0.25));
  }
  .badge {
    display: inline-block; font-family: var(--brand-font-mono);
    font-size: 1.4vw; font-weight: 600; color: var(--brand-cta);
    background: var(--brand-badge-cta-bg, rgba(245, 158, 11, 0.1));
    border: 1px solid var(--brand-cta); padding: 0.6vh 2.5vw;
    border-radius: 100px; text-transform: uppercase; letter-spacing: 0.15em;
  }
  .subtitle {
    font-family: var(--brand-font-body); font-size: 2vw; font-weight: 500;
    color: var(--brand-text-secondary); text-align: center; line-height: 1.4; max-width: 70%;
  }
  .separator { display: flex; gap: 0.8vw; align-items: center; }
  .separator-dot { width: 0.5vw; height: 0.5vw; border-radius: 50%; background: var(--brand-accent); opacity: 0.5; }
  .separator-line { width: 6vw; height: 2px; background: linear-gradient(90deg, var(--brand-accent), transparent); opacity: 0.3; }
  .footer {
    position: absolute; bottom: 5%; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .footer-name {
    font-family: var(--brand-font-mono); font-size: 1.3vw; font-weight: 500;
    color: var(--brand-text-muted); letter-spacing: 0.08em;
  }
  @media (max-aspect-ratio: 5/4) {
    .hero-visual { width: 35vw; height: 16vw; }
    .badge { font-size: 2vw; padding: 1vh 4vw; }
    .subtitle { font-size: 3vw; max-width: 80%; }
    .footer-name { font-size: 2vw; }
  }
</style>
</head>
<body>
<div class="accent-line"></div>
<div class="deco-circle-1"></div>
<div class="deco-circle-2"></div>
<div class="deco-grid"></div>
<div class="card">
  <div class="hero-visual">
    <svg viewBox="0 0 400 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="80" y1="80" x2="170" y2="50" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2" opacity="0.5"/>
      <line x1="80" y1="80" x2="170" y2="110" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2" opacity="0.5"/>
      <line x1="230" y1="50" x2="320" y2="80" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2" opacity="0.5"/>
      <line x1="230" y1="110" x2="320" y2="80" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2" opacity="0.5"/>
      <circle cx="80" cy="80" r="32" fill="var(--brand-accent, #5B8DEF)" opacity="0.06"/>
      <circle cx="320" cy="80" r="32" fill="var(--brand-cta, #F59E0B)" opacity="0.06"/>
      <circle cx="80" cy="80" r="22" fill="var(--brand-bg-surface, #1A1A20)" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2.5"/>
      <circle cx="80" cy="80" r="8" fill="var(--brand-accent, #5B8DEF)" opacity="0.6"/>
      <circle cx="200" cy="50" r="18" fill="var(--brand-bg-surface, #1A1A20)" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2"/>
      <circle cx="200" cy="50" r="6" fill="var(--brand-accent, #5B8DEF)" opacity="0.6"/>
      <circle cx="200" cy="110" r="18" fill="var(--brand-bg-surface, #1A1A20)" stroke="var(--brand-accent, #5B8DEF)" stroke-width="2"/>
      <circle cx="200" cy="110" r="6" fill="var(--brand-accent, #5B8DEF)" opacity="0.6"/>
      <circle cx="320" cy="80" r="22" fill="var(--brand-bg-surface, #1A1A20)" stroke="var(--brand-cta, #F59E0B)" stroke-width="2.5"/>
      <circle cx="320" cy="80" r="8" fill="var(--brand-cta, #F59E0B)" opacity="0.6"/>
    </svg>
  </div>
  <div class="badge" id="badge"></div>
  <div class="separator">
    <div class="separator-line"></div>
    <div class="separator-dot"></div>
    <div class="separator-dot"></div>
    <div class="separator-dot"></div>
    <div class="separator-line" style="transform: scaleX(-1)"></div>
  </div>
  <div class="subtitle" id="subtitle"></div>
</div>
<div class="footer">
  <span class="footer-name" id="footerName"></span>
</div>
<script src="_base.js"></script>
<script src="product-cover.js"></script>
</body>
</html>
