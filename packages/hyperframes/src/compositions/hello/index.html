<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: linear-gradient(160deg, #0e0e12 0%, #1a1438 100%);
        font-family:
          'Inter',
          -apple-system,
          system-ui,
          sans-serif;
        color: #fff;
      }
      /*
        Hyperframes adds absolute positioning to elements with class="clip"
        so the framework can mount/unmount them on the timeline. That means
        a single `.clip` holds our whole layout, and flex-positioning
        happens INSIDE it, on regular static children. One clip on the
        timeline, three visible text blocks stacked cleanly.
      */
      #layout {
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0 80px;
        gap: 40px;
        text-align: center;
      }
      #badge {
        font-size: 36px;
        font-weight: 600;
        padding: 14px 32px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.2);
        border: 1px solid rgba(124, 58, 237, 0.6);
        color: #c4b5fd;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #headline {
        font-size: 132px;
        font-weight: 800;
        line-height: 1.02;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #c4b5fd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        max-width: 920px;
      }
      #subhead {
        font-size: 42px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.78);
        max-width: 860px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="hello"
      data-start="0"
      data-duration="{{durationSeconds}}"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="layout"
        class="clip"
        data-start="0"
        data-duration="{{durationSeconds}}"
        data-track-index="1"
      >
        <div id="badge">{{badge}}</div>
        <div id="headline">{{headline}}</div>
        <div id="subhead">{{subheadline}}</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from('#badge', { opacity: 0, y: 24, duration: 0.7, ease: 'power3.out' }, 0);
      tl.from(
        '#headline',
        { opacity: 0, y: 60, scale: 0.94, duration: 0.95, ease: 'power3.out' },
        0.18
      );
      tl.from('#subhead', { opacity: 0, y: 20, duration: 0.75, ease: 'power2.out' }, 0.55);
      window.__timelines['hello'] = tl;
    </script>
  </body>
</html>
