<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13111f"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <linearGradient id="gMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="gBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.30"/>
    </linearGradient>
    <!-- Clip to middle frame bounds for scan line -->
    <clipPath id="midClip">
      <rect x="5" y="35" width="90" height="28" rx="5"/>
    </clipPath>

    <style>
      /* ── Intro: frames stack in from bottom-to-top ── */
      .f-bot { animation: slideIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s forwards; }
      .f-mid { animation: slideIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.22s forwards; }
      .f-top { animation: slideIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.39s forwards; }

      /* ── Play button pops in, then pulses ── */
      .play {
        transform-box: fill-box;
        transform-origin: center;
        animation:
          popIn  0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards,
          pulse  2.6s  ease-in-out 1.5s infinite;
      }

      /* ── Render scan line sweeps across middle frame ── */
      .scan {
        animation: scanMove 3.6s linear 1.6s infinite;
      }

      /* ── Ghost frames breathe slowly (offset phases) ── */
      .r-top { animation: breathe 4s ease-in-out 2s   infinite; }
      .r-bot { animation: breathe 4s ease-in-out 3.2s infinite; }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(9px); }
        to   { opacity: 1; transform: translateY(0);   }
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.3); }
        to   { opacity: 1; transform: scale(1);   }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1;    transform: scale(1);    }
        50%       { opacity: 0.65; transform: scale(0.82); }
      }

      /* Scan: move from left edge to right edge of middle frame */
      @keyframes scanMove {
        0%   { transform: translateX(-6px);  opacity: 0;   }
        4%   { opacity: 0.85; }
        72%  { opacity: 0.85; }
        78%  { transform: translateX(90px);  opacity: 0;   }
        100% { transform: translateX(90px);  opacity: 0;   }
      }

      @keyframes breathe {
        0%, 100% { opacity: 1;   }
        50%       { opacity: 0.5; }
      }
    </style>
  </defs>

  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Bottom frame (ghost, stacks in first) -->
  <g class="f-bot">
    <rect class="r-bot" x="10" y="69" width="80" height="18" rx="4" fill="url(#gBot)"/>
  </g>

  <!-- Middle frame (active render surface) -->
  <g class="f-mid">
    <rect x="5" y="35" width="90" height="28" rx="5" fill="url(#gMid)"/>

    <!-- Scan line: clipped to middle frame, sweeps L→R like a render pass -->
    <g clip-path="url(#midClip)">
      <rect class="scan" x="5" y="35" width="7" height="28" rx="2" fill="white" opacity="0.18"/>
    </g>

    <!-- Play triangle -->
    <polygon class="play" points="38,43 38,57 62,50" fill="white"/>
  </g>

  <!-- Top frame (ghost, stacks in last) -->
  <g class="f-top">
    <rect class="r-top" x="10" y="10" width="80" height="19" rx="4" fill="url(#gTop)"/>
  </g>
</svg>
