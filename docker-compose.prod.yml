services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # One-shot: create the MinIO bucket and make rendered videos publicly readable.
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/${MINIO_BUCKET} &&
        mc anonymous set download local/${MINIO_BUCKET} &&
        echo 'MinIO bucket ${MINIO_BUCKET} ready.'
      "
    restart: "no"

  # One-shot: push Prisma schema to the prod DB and seed the module catalog.
  # This project is schema-first (no prisma/migrations directory), so we use
  # `db push --accept-data-loss` rather than `migrate deploy`. Re-runs are
  # idempotent: db push only changes structure that drifted, and the seed
  # script upserts module rows so it's safe to run repeatedly.
  db-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    # Override the Dockerfile's USER worker (uid 1001). db push needs to write
    # to /app/node_modules/.prisma/client/ (root-owned from the build), and
    # this is a privileged one-shot anyway — running as root is fine.
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: >
      sh -c "
        bunx prisma db push --schema=packages/database/prisma/schema.prisma --accept-data-loss &&
        bun run scripts/seed-modules.ts &&
        echo 'Schema + module catalog ready.'
      "
    restart: "no"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # Inlined into the client JS bundle at build time (must be passed here,
        # runtime env vars aren't enough for NEXT_PUBLIC_*).
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_ALLOW_DEV_LOGIN: ${NEXT_PUBLIC_ALLOW_DEV_LOGIN}
        NEXT_PUBLIC_ALLOW_PRIVATE_URLS: ${NEXT_PUBLIC_ALLOW_PRIVATE_URLS}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    # Chrome shared-memory headroom for Remotion / Hyperframes parallel capture.
    shm_size: 1g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bun.*worker' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  reel-worker:
    profiles: ["reel"]
    build:
      context: .
      dockerfile: docker/Dockerfile.reel-worker
    env_file: .env
    shm_size: 1g
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion-bundle
      - CHROME_PATH=/usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bun.*reel-worker' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-reelstack-dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
