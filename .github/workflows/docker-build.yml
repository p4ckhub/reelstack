name: Build Docker Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack:latest
            ghcr.io/jurczykpawel/reelstack:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack-worker:latest
            ghcr.io/jurczykpawel/reelstack-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push reel-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.reel-worker
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack-reel-worker:latest
            ghcr.io/jurczykpawel/reelstack-reel-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
