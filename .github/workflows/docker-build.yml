name: Build Docker Image

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ── Private modules ─────────────────────────────────────────
      # Clone reelstack-modules (private, AGPL-incompatible) into the
      # gitignored packages/modules/src/private/ directory so they ship
      # inside the Docker images. If the deploy key is absent (fork or
      # first-time build), we skip — the image still builds with only
      # public core modules.
      - name: Clone private modules
        env:
          MODULES_DEPLOY_KEY: ${{ secrets.MODULES_DEPLOY_KEY }}
        run: |
          if [ -z "$MODULES_DEPLOY_KEY" ]; then
            echo "::warning::MODULES_DEPLOY_KEY secret missing — building without private modules"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$MODULES_DEPLOY_KEY" > ~/.ssh/modules_key
          chmod 600 ~/.ssh/modules_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/modules_key -o StrictHostKeyChecking=yes" \
            git clone --depth=1 git@github.com:jurczykpawel/reelstack-modules.git /tmp/modules
          rm -rf packages/modules/src/private
          mkdir -p packages/modules/src/private
          cp -r /tmp/modules/src/. packages/modules/src/private/
          ls packages/modules/src/private

      # Regenerate the local Remotion entry so the renderer picks up the
      # private compositions. Mirrors what scripts/sync-private-modules.sh
      # does locally, minus the rsync step we did above.
      - name: Generate Remotion entry with private compositions
        run: |
          if [ ! -d packages/modules/src/private/remotion ]; then
            echo "No private remotion compositions - skipping local entry"
            exit 0
          fi
          cat > apps/web/remotion-entry.local.ts << 'EOF'
          /**
           * Local Remotion entry point with private module compositions.
           * Auto-generated by CI — do not edit.
           * This file is .gitignored.
           */
          import { registerRoot } from 'remotion';
          import { RemotionRoot } from '@reelstack/remotion/compositions/Root';
          import '@reelstack/modules/remotion';
          import '../../packages/modules/src/private/remotion/index';
          registerRoot(RemotionRoot);
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack:latest
            ghcr.io/jurczykpawel/reelstack:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack-worker:latest
            ghcr.io/jurczykpawel/reelstack-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push reel-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.reel-worker
          push: true
          provenance: false
          tags: |
            ghcr.io/jurczykpawel/reelstack-reel-worker:latest
            ghcr.io/jurczykpawel/reelstack-reel-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to mikrus
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            -p ${{ secrets.DEPLOY_PORT }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'cd ~/reelstack && docker compose pull && docker compose up -d --remove-orphans && docker compose restart nginx && docker image prune -f'
